name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            source "$NVM_DIR/nvm.sh"

            cd ${{ secrets.PROJECT_PATH }}

            git pull
            npx prisma migrate deploy
            npm run build
            pm2 restart fairbook
      - name: Telegram success notification
        if: success()
        run: |
          MESSAGE="✅ Fairbook deploy sikeres%0A%0A🌿 Branch: ${{ github.ref_name }}%0A👤 User: ${{ github.actor }}%0A📝 Commit: ${{ github.event.head_commit.message }}%0A🔗 SHA: ${{ github.sha }}"

          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d text="$MESSAGE"
      - name: Telegram failure notification
        if: failure()
        run: |
          MESSAGE="❌ Fairbook deploy sikertelen%0A%0A🌿 Branch: ${{ github.ref_name }}%0A👤 User: ${{ github.actor }}%0A📝 Commit: ${{ github.event.head_commit.message }}%0A🔗 SHA: ${{ github.sha }}%0A%0A🔍 Nézd meg a GitHub Actions logot."

          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d text="$MESSAGE"
