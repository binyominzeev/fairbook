name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "HOME=$HOME"
            which node || true
            node -v || true
            which npm || true
            npm -v || true
            which pm2 || true

            export NVM_DIR="$HOME/.nvm"
            source "$NVM_DIR/nvm.sh"

            echo "--- AFTER NVM ---"
            which node
            node -v
            which npm
            npm -v
            which pm2

            cd ${{ secrets.PROJECT_PATH }}
            git pull